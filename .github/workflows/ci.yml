name: KalaSetu CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:

  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Backend Dependencies
        run: npm install
        working-directory: backend

      - name: Lint Backend Code
        run: npm run lint
        working-directory: backend

      - name: Run Backend Tests
        run: npm test
        working-directory: backend


  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    needs: backend   # 👈 runs AFTER backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Frontend Dependencies
        run: npm install
        working-directory: frontend

      - name: Lint Frontend Code
        run: npm run lint
        working-directory: frontend

      - name: Build Frontend
        run: npm run build
        working-directory: frontend


  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: frontend   # 👈 runs AFTER frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Image (Backend)
        run: docker build -t kalasetu-backend ./backend

      - name: Build Docker Image (Frontend)
        run: docker build -t kalasetu-frontend ./frontend