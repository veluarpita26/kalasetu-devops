name: KalaSetu CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:

  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: npm install

      # 🔹 LINT
      - name: Lint Backend Code
        run: npm run lint

      # 🔹 TEST (safe)
      - name: Run Backend Tests
        run: npm test || echo "No backend tests yet"


  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm install

      # 🔹 LINT
      - name: Lint Frontend Code
        run: npm run lint

      # 🔹 TEST (IMPORTANT)
      - name: Run Frontend Tests
        run: npm test

      # 🔹 BUILD
      - name: Build Frontend
        run: npm run build